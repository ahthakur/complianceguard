apiVersion: complianceguard/v1
kind: NetworkPolicy
metadata:
  name: network-security-baseline
  version: "1.0.0"
  pci_controls:
    - "PCI-DSS-v4.0-1.3.1"
    - "PCI-DSS-v4.0-1.3.2"

rules:
  - id: no-host-network
    description: "Containers must not use host network mode"
    severity: CRITICAL
    check:
      field: network_mode
      operator: not_equals
      value: "host"
    pci_control: "PCI-DSS-v4.0-1.3.1"

  - id: no-exposed-sensitive-ports
    description: "Sensitive ports must not be exposed publicly"
    severity: HIGH
    sensitive_ports: [22, 3306, 5432, 6379, 27017]
    pci_control: "PCI-DSS-v4.0-1.3.2"
